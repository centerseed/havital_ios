appId: com.havital.Havital.dev
---
# 子流程：Speed Endurance 維持方法論課表品質驗證
# 依據：speed-endurance-workout-spec.md
# 前提：在每日訓練頁面，課表已載入
# 驗證：
#   1. 不允許 interval / short_interval / race_pace
#   2. 應以輕鬆跑為主
#   3. maintenance 階段可有 fartlek/strides，但無 tempo/threshold

# === 0. Scroll to top（確保 assertNotVisible 在正確 viewport）===
- scrollUntilVisible:
    element: "每日訓練"
    direction: UP
    timeout: 10000

# === 1. 禁止出現的賽季導向訓練類型 ===
- assertNotVisible:
    text: "間歇訓練"
    optional: false
- assertNotVisible:
    text: "短間歇"
    optional: false
- assertNotVisible:
    text: "比賽配速跑"
    optional: false

# === 2. 必須有輕鬆跑系列訓練（輕鬆跑或長距離輕鬆跑）===
- scrollUntilVisible:
    element:
      text: "輕鬆跑|長距離輕鬆跑"
    direction: DOWN
    timeout: 15000
- assertVisible:
    text: "輕鬆跑|長距離輕鬆跑"

# === 3. 強度分布驗證 ===
- scrollUntilVisible:
    element: "週跑量和訓練強度"
    direction: UP
    timeout: 10000
- assertVisible:
    text: "低 \\d+/\\d+"

# === 4. 距離顯示 ===
- assertVisible:
    text: "km|miles"

# === 5. 七天完整 + 休息日 ===
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "休息"
    direction: UP
    timeout: 10000
