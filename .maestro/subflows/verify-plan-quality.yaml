appId: com.havital.Havital.dev
---
# 子流程：課表品質驗證（兼容舊 flow，內部改接 guardrail helper）
- runFlow: assert-weekly-plan-7days.yaml

- assertVisible:
    text: "km|miles"
    optional: true

- scrollUntilVisible:
    element: "週跑量和訓練強度|Weekly Volume & Intensity|Weekly Volume"
    direction: DOWN
    timeout: 15000
    optional: true

- assertVisible:
    text: "低 \\d+/\\d+|Low \\d+/\\d+"
    optional: true
- assertVisible:
    text: "高 \\d+/\\d+|High \\d+/\\d+"
    optional: true

- scrollUntilVisible:
    element: "HR \\d+-\\d+"
    direction: DOWN
    timeout: 10000
    optional: true

- scrollUntilVisible:
    element:
      text: "輕鬆跑|長距離輕鬆跑|Easy Run|LSD Run|Long Easy Run"
    direction: UP
    timeout: 10000
