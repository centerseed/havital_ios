appId: com.havital.Havital.dev
---
# 子流程：維持訓練方法論 (Paceriz maintenance) 課表品質驗證
# 依據：目前 maintenance target types：default_methodology = paceriz
# 前提：在每日訓練頁面，課表已載入
# 驗證：
#   1. 不應出現 race-pace 型賽事課
#   2. 必須有輕鬆跑與休息日
#   3. 強度分布以 low 為主

# === 1. 禁止 race-pace 型賽事課 ===
- assertNotVisible:
    text: "配速跑"
    optional: false

# === 2. 必須有輕鬆跑 ===
- scrollUntilVisible:
    element: "輕鬆跑"
    direction: UP
    timeout: 10000
- assertVisible: "輕鬆跑"

# === 3. 強度分布驗證 ===
- scrollUntilVisible:
    element: "週跑量和訓練強度"
    direction: UP
    timeout: 10000

# 低強度應為主要比例
- assertVisible:
    text: "低 \\d+/\\d+"

# === 4. 七天完整 + 休息日 ===
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "休息"
    direction: UP
    timeout: 10000
