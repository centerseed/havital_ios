appId: com.havital.Havital.dev
---
# Guardrail helper: verify the weekly plan renders all seven days and includes a rest/easy anchor.
- assertVisible:
    text: "每日訓練|Daily Training|Training Plan"

- assertVisible:
    text: "星期一|Monday"

- scrollUntilVisible:
    element:
      text: "星期日|Sunday"
    direction: DOWN
    timeout: 15000

- scrollUntilVisible:
    element:
      text: "休息|Rest|輕鬆跑|Easy Run|長距離輕鬆跑|Long Easy Run"
    direction: UP
    timeout: 10000
