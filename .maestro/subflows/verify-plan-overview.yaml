appId: com.havital.Havital.dev
---
# 子流程：訓練計畫概覽頁面驗證
- tapOn: "更多"
- tapOn:
    text: "訓練計畫概覽|訓練總覽"

- runFlow: assert-plan-overview-integrity.yaml

- tapOn:
    text: "訓練計畫|Training Plan"

- scrollUntilVisible:
    element:
      text: "轉換期|基礎期|強化期|巔峰期|減量期|維持期|發展期|週"
    direction: DOWN
    timeout: 15000
    optional: true

- scrollUntilVisible:
    element: "支援賽事"
    direction: DOWN
    timeout: 10000
    optional: true
