appId: com.havital.Havital.dev
---
# 子流程：驗證課表包含完整 7 天
# 前提：在每日訓練頁面，課表已載入
# 後置：頁面滑動至有休息日的位置

# 確認在每日訓練頁面
- assertVisible: "每日訓練"

# 確認星期一可見（課表從星期一開始）
- assertVisible: "星期一"

# 滑動確認星期二存在
- scrollUntilVisible:
    element: "星期二"
    direction: DOWN
    timeout: 5000

# 滑動確認星期日存在（7 天都包含）
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 10000
