appId: com.havital.Havital.dev
---
# 子流程：Complete 5K 新手方法論課表品質驗證
# 依據：complete-5k-workout-spec.md
# 前提：在每日訓練頁面，課表已載入
# 驗證：
#   1. easy_only：不允許任何 tempo/threshold/interval
#   2. 強度分布固定為 100% low
#   3. 至少 4 天休息或輕鬆活動
#   4. 長跑上限 6km

# === 1. 禁止出現的高強度訓練類型 ===
- assertNotVisible:
    text: "間歇訓練"
    optional: false
- assertNotVisible:
    text: "節奏跑"
    optional: false
- assertNotVisible:
    text: "巡航間歇"
    optional: false
- assertNotVisible:
    text: "配速跑"
    optional: false
- assertNotVisible:
    text: "漸進跑"
    optional: false
- assertNotVisible:
    text: "法特雷克"
    optional: false
- assertNotVisible:
    text: "閾值跑"
    optional: false

# === 2. 必須有輕鬆跑 ===
- scrollUntilVisible:
    element: "輕鬆跑"
    direction: UP
    timeout: 10000
- assertVisible: "輕鬆跑"

# === 3. 強度分布驗證：100% low ===
- scrollUntilVisible:
    element: "週跑量和訓練強度"
    direction: UP
    timeout: 10000
- assertVisible:
    text: "低 \\d+/\\d+"

# === 4. 七天完整 + 足夠休息日 ===
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "休息"
    direction: UP
    timeout: 10000
