appId: com.havital.Havital.dev
---
# Shared entry: converge to logged-in "Daily Training" screen.
- launchApp:
    stopApp: true
    clearState: false
    arguments:
      -skipHealthKitAuth: "true"

- runFlow:
    file: reviewer-demo-login.yaml
    optional: true

- tapOn:
    text: "不允許|Don't Allow|Don’t Allow|許可しない"
    optional: true

- tapOn:
    text: "稍後|Later|後で"
    optional: true

- tapOn:
    text: "允許|Allow|許可"
    optional: true

- tapOn:
    text: "好|OK"
    optional: true

# Previous flows may leave the app inside an edit sheet. Back out before
# converging to the training plan screen.
- tapOn:
    text: "取消|Cancel|キャンセル"
    optional: true

# Dismiss modal-like pages if they are already open.
- tapOn:
    id: "AnnouncementPopup_CloseButton"
    optional: true

- tapOn:
    text: "關閉|Close|閉じる|完成|Done"
    optional: true

- tapOn:
    id: "AnnouncementPopup_CloseButton"
    optional: true

- tapOn:
    text: "關閉|Close|閉じる|完成|Done"
    optional: true

# Keep Paceriz foregrounded after optional system prompt handling. A bare back
# can return the simulator to SpringBoard when no modal is open.
- launchApp:
    stopApp: false
    clearState: false
    arguments:
      -skipHealthKitAuth: "true"

# If tab is not focused, switch to training plan tab.
- tapOn:
    text: "訓練計劃|訓練計畫|Training Plan|トレーニング計画|日々のトレーニング"
    optional: true

- extendedWaitUntil:
    visible:
      text: "每日訓練|Daily Training|Training Plan|訓練計畫|日々のトレーニング|トレーニング計画|需要產生週回顧|需要產生週課表"
    timeout: 25000

- assertVisible:
    text: "每日訓練|Daily Training|Training Plan|訓練計畫|日々のトレーニング|トレーニング計画|需要產生週回顧|需要產生週課表"
