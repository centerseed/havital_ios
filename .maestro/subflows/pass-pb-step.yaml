appId: com.havital.Havital.dev
---
# 子流程：通過個人最佳成績頁面
# 若預設帶出「有個人最佳成績」但時間為 0，先關掉 toggle，避免下一步被 disabled。
- assertVisible:
    id: "PersonalBest_ContinueButton"
- runFlow:
    when:
      visible: "請輸入有效的時間以計算配速。|Please enter a valid time to calculate pace.|ペースを計算するために有効な時間を入力してください。"
    commands:
      - tapOn:
          id: "PersonalBest_HasPBToggle"
      - waitForAnimationToEnd
- tapOn:
    id: "PersonalBest_ContinueButton"
