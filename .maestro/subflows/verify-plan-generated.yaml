appId: com.havital.Havital.dev
---
# 子流程：驗證 plan overview → weekly plan → 課表合理性

# Plan Overview 必須出現
- assertVisible: "訓練總覽"
- assertVisible:
    id: "TrainingOverview_WeeksLabel"

# 生成第一週計劃
- tapOn:
    id: "TrainingOverview_GenerateButton"

# Weekly Plan 必須出現
- assertVisible: "每日訓練"
- assertVisible: "星期一"

# 課表合理性：必須有休息日
- assertVisible: "休息"

# 滑動看更多天
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
