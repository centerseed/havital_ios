appId: com.havital.Havital.dev
tags:
  - qa
  - weekly-preview
---
# QA 測試：週訓練骨架預覽 UI

- runFlow: ../subflows/ensure-main-training-screen.yaml

# 截圖：主畫面初始狀態
- takeScreenshot: qa_01_main_screen

# === P0-1：進入訓練總覽（預覽頁） ===
- tapOn: "更多"
- tapOn:
    text: "訓練計畫概覽|訓練總覽"
- extendedWaitUntil:
    visible:
      text: "我的訓練目標|訓練總覽|Training Overview"
    timeout: 15000

- assertVisible:
    text: "目標賽事|支援賽事|總週數|賽事日期|目標配速"

- scrollUntilVisible:
    element:
      text: "訓練時間軸|基礎期|強化期|巔峰期|減量期|維持期|發展期"
    direction: DOWN
    timeout: 10000
    optional: true

- takeScreenshot: qa_02_preview_card_visible

# === P0-2：驗證預覽內容 ===
- assertVisible:
    text: "確認並生成第一週計劃|產生週課表|產生下週課表|接受調整並產生下週課表"
    optional: true

- takeScreenshot: qa_04_sheet_content

# === 返回主畫面 ===
- tapOn:
    text: "關閉"

# 回到主畫面
- extendedWaitUntil:
    visible:
      text: "每日訓練|Daily Training|Training Plan"
    timeout: 5000

- takeScreenshot: qa_05_after_close
