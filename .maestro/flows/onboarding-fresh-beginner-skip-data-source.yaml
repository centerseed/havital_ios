appId: com.havital.Havital.dev
tags:
  - onboarding
  - critical
  - beginner
  - fresh-user
  - unbound-data-source
---
# 前置：先執行 Scripts/dev_user_admin.py reset-fresh --demo
# 目的：驗證全新、未綁定資料源用戶可以用「稍後設定」完成 onboarding，
#      並在課表生成後收到資料源提醒。

- launchApp:
    stopApp: true
    clearState: true
    arguments:
      "-ui_testing_onboarding": true
      "-ui_testing_reviewer_demo": true
      "-resetOnboarding": true
      "-skipHealthKitAuth": true
      "-reviewerAccessPressDuration": "0.5"

- extendedWaitUntil:
    visible:
      id: "Login_ReviewerAccessTrigger"
    timeout: 15000
    optional: true

- tapOn:
    text: "不允許|Don't Allow|Don’t Allow|不允许"
    optional: true
- tapOn:
    text: "稍後|Later|後で"
    optional: true
- tapOn:
    text: "關閉|Close|閉じる|完成|Done|完了"
    optional: true

- runFlow:
    file: ../subflows/reviewer-demo-login.yaml
    optional: true

- tapOn:
    text: "稍後|Later|後で"
    optional: true
- tapOn:
    text: "關閉|Close|閉じる|完成|Done|完了"
    optional: true

- extendedWaitUntil:
    visible:
      id: "OnboardingStartButton"
    timeout: 30000
    optional: true
- extendedWaitUntil:
    visible:
      id: "DataSource_Screen"
    timeout: 30000
    optional: true

- extendedWaitUntil:
    visible:
      id: "OnboardingStartButton"
    timeout: 30000
    optional: true
- tapOn:
    id: "OnboardingStartButton"
    optional: true
- tapOn:
    text: "開始設定|Start Setup|設定開始"
    optional: true

- extendedWaitUntil:
    visible:
      id: "DataSource_Screen"
    timeout: 15000
    optional: true
- assertVisible:
    id: "DataSource_Screen"
- tapOn:
    text: "稍後設定|Set Up Later|後で設定"

- tapOn:
    id: "HeartRateZone_ContinueButton"
    optional: true
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true
- tapOn:
    text: "略過|Skip|スキップ"
    optional: true

- runFlow:
    file: ../subflows/pass-pb-step.yaml
    when:
      visible:
        id: "PersonalBest_ContinueButton"

- runFlow:
    file: ../subflows/pass-weekly-distance.yaml
    when:
      visible:
        id: "WeeklyDistance_ContinueButton"

- assertVisible:
    id: "GoalType_NextButton"
- tapOn:
    id: "GoalType_beginner"
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

- tapOn:
    id: "TrainingWeeks_NextButton"
    optional: true
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true
- tapOn:
    id: "StartStage_NextButton"
    optional: true
- tapOn:
    text: "繼續|Continue|続行"
    optional: true
- tapOn:
    id: "Methodology_NextButton"
    optional: true
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true

- assertVisible:
    id: "TrainingDays_SaveButton"
- tapOn:
    id: "TrainingDay_2"
- tapOn:
    id: "TrainingDay_6"
- tapOn:
    id: "LongRunDay_6"
    optional: true
- tapOn:
    text: "週日|Sunday|日曜日"
    optional: true
- tapOn:
    id: "TrainingDays_SaveButton"

- runFlow: ../subflows/verify-plan-generated.yaml

- extendedWaitUntil:
    visible:
      text: "需要綁定數據源|Data Source Required|データソースの接続が必要です"
    timeout: 15000
- assertVisible:
    text: "需要綁定數據源|Data Source Required|データソースの接続が必要です"
- tapOn:
    text: "稍後|Later|あとで"

- assertVisible:
    text: "每日訓練|Daily Training|Training Plan"

- runFlow: ../subflows/nav-to-profile.yaml
- assertVisible:
    text: "尚未綁定|Not Connected|未接続"
