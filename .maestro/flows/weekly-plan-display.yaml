appId: com.havital.Havital.dev
tags:
  - smoke
  - weekly-plan
---
# 週課表顯示正確性驗證

- assertVisible: "每日訓練"
- assertVisible: "星期一"

# 驗證週課表結構完整（星期一~日可見），不驗證特定訓練類型（動態資料）
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 15000

# 至少有一個休息日（合理課表必備）
- scrollUntilVisible:
    element: "休息"
    direction: UP
    timeout: 10000
