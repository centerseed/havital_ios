appId: com.havital.Havital.dev
---
# Verify AC-PAYWALL-32/33/34: Disclosure links + trial end date
# Precondition: Demo login, app is on any logged-in screen.
# This flow opens paywall via Settings > Subscription section.

- launchApp:
    stopApp: true
    clearState: false

- tapOn:
    text: "允許"
    optional: true
- tapOn:
    text: "好"
    optional: true

# Login via reviewer demo access
- runFlow:
    file: ../subflows/reviewer-demo-login.yaml
    optional: true

# Dismiss any pending sheets
- tapOn:
    text: "完成|Done"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Wait for main app to load
- extendedWaitUntil:
    visible: "更多|More|もっと見る|訓練計劃|訓練計畫|Training Plan|每日訓練|Daily Training"
    timeout: 30000

# Navigate to More / Profile
- tapOn:
    text: "更多|More|もっと見る"

- extendedWaitUntil:
    visible: "個人資料|Profile|プロフィール"
    timeout: 10000

- tapOn:
    text: "個人資料|Profile|プロフィール"

- extendedWaitUntil:
    visible: "訂閱|Subscription|サブスクリプション"
    timeout: 15000

# Open paywall via subscription upgrade button
- tapOn:
    id: "Subscription_UpgradeButton"

- extendedWaitUntil:
    visible:
      id: "Paywall_Disclosure"
    timeout: 15000

# Screenshot 1: Paywall open with disclosure area (yearly focused = trial date + links)
- takeScreenshot: ".maestro/screenshots/AC32-33-34_paywall_disclosure_yearly.png"

# Scroll down to make disclosure fully visible
- swipe:
    direction: UP
    duration: 1000
- waitForAnimationToEnd:
    timeout: 500

# Screenshot 2: Disclosure area scrolled into view
- takeScreenshot: ".maestro/screenshots/AC32-33-34_disclosure_scrolled.png"

# Assert disclosure is visible
- assertVisible:
    id: "Paywall_Disclosure"

# Tap on the disclosure to try privacy link (tap on 服務條款 / Terms of Use text area)
# The disclosure text contains clickable links — tap the general area
# Note: Exact link tap verification requires manual visual inspection
# The SFSafariViewController will open if a link is tapped

# Close paywall
- tapOn:
    id: "Paywall_CloseButton"

- waitForAnimationToEnd:
    timeout: 1500

- takeScreenshot: ".maestro/screenshots/AC32-33-34_after_dismiss.png"
