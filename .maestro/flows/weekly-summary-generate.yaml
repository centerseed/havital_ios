appId: com.havital.Havital.dev
tags:
  - weekly-summary
  - critical
---
# 測試：產生週回顧
# 前提：app 在主課表頁，有課表資料
# 用 Debug 工具觸發週回顧產生

- assertVisible: "每日訓練"

# 開選單 → Debug 工具 → 產生週回顧
- tapOn: "更多"
- tapOn:
    text: "🐛 Debug 工具"
- tapOn: "🐛 產生週回顧"

# 等待產生（API + LLM 生成，可能需要 30 秒）
- extendedWaitUntil:
    visible: "訓練完成度"
    timeout: 45000

# 驗證週回顧內容
- assertVisible: "本週亮點"
- assertVisible: "訓練分析"
- assertVisible: "下週調整建議"
- assertVisible: "產生下週課表"
