appId: com.havital.Havital.dev
---
# 簡單的 Demo 登入流程（不清除 state，不觸發 onboarding）
# 前提：App 在登入頁面
- launchApp:
    stopApp: true
    clearState: false

- runFlow: ../subflows/reviewer-demo-login.yaml

- tapOn:
    text: "稍後|Later|後で"
    optional: true

- extendedWaitUntil:
    visible:
      id: "ellipsis.circle"
    timeout: 30000
