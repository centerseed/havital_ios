appId: com.havital.Havital.dev
tags:
  - edit
  - critical
  - strength
---
# 測試：跑步編輯器儲存路徑可用
# 目標：開啟 gear、套用建議配速、儲存後回到編輯週課表

- runFlow: ../subflows/ensure-main-training-screen.yaml

- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"

- tapOn:
    id: "day_2_edit_gear"
- assertVisible: "編輯訓練"

- tapOn:
    text: "套用"
    optional: true
- tapOn: "儲存"
- assertVisible: "編輯週課表"

- tapOn: "取消"
- tapOn:
    text: "放棄變更"
    optional: true
- runFlow: ../subflows/ensure-main-training-screen.yaml
