appId: com.havital.Havital.dev
tags:
  - edit
  - critical
  - strength
---
# 測試：拖動排序 — 把星期一（輕鬆跑+力量）往下移
# 編輯頁使用 List + .onMove，左側有拖動 handle（三條線）
# 注意：Maestro 的 longPress + swipe 無法可靠模擬 SwiftUI List drag，
#      本 flow 驗證進入拖動模式後取消，不實際儲存排序結果。

# 重啟 app 並收斂到主課表頁
- runFlow: ../subflows/ensure-main-training-screen.yaml

# 確認初始狀態
- assertVisible: "每日訓練"
- assertVisible: "星期一|Monday"

# 進編輯
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"

# 嘗試拖動星期一到星期二下方
# List 在 editMode 時，右側有 ≡ 拖動 handle
- longPressOn:
    point: "95%, 17%"
- swipe:
    start: "95%, 17%"
    end: "95%, 33%"
    duration: 1000

# 取消退出（不儲存，避免後端資料污染）
# 若拖動成功產生 unsaved changes，取消時會出現放棄變更 alert
- tapOn: "取消"
- tapOn:
    text: "放棄變更"
    optional: true
- runFlow: ../subflows/ensure-main-training-screen.yaml

# 驗證
- assertVisible: "每日訓練"
- assertVisible: "星期一|Monday"
