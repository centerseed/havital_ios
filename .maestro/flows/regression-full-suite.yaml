appId: com.havital.Havital.dev
tags:
  - regression
  - suite
  - critical
---
# 完整回歸測試套件
# 流程：清除狀態 → Demo 登入 → Beginner onboarding → 依序跑所有測試
# 前提：無（會自動清除 app 數據）

# === Phase 1: 建立全新用戶 + 課表 ===
- runFlow: ../subflows/logout-and-demo-login.yaml
- runFlow: ../subflows/pass-pb-step.yaml
- runFlow: ../subflows/pass-weekly-distance.yaml

- assertVisible: "訓練目標"
- tapOn: "新手入門"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true
- tapOn:
    id: "TrainingWeeks_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "StartStage_NextButton"
    optional: true
- tapOn:
    text: "繼續"
    optional: true
- tapOn:
    id: "Methodology_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

- assertVisible: "訓練偏好設定"
- tapOn:
    id: "TrainingDays_SaveButton"

- runFlow: ../subflows/verify-plan-generated.yaml

# Beginner 合理性（方法論特定驗證）
# 依據：complete-10k-workout-spec.md
- runFlow: ../subflows/verify-methodology-beginner.yaml

# === Phase 2: 品質驗證 ===
- runFlow: ../subflows/verify-plan-quality.yaml

# === Phase 3: 週課表顯示 ===
# (verify-plan-quality 已滑過 7 天 + 休息日，等同 weekly-plan-display 驗證)

# === Phase 4: 設定頁回歸 ===
- tapOn: "更多"
- tapOn: "個人資料"
- extendedWaitUntil:
    visible: "個人資料"
    timeout: 10000

# 驗證 profile sections
- assertVisible: "訓練資訊"
- scrollUntilVisible:
    element: "登出"
    direction: DOWN
    timeout: 10000

# 回到主頁（profile 可能是 sheet，嘗試多種方式關閉）
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 300
    optional: true
- tapOn:
    text: "關閉|完成|Done"
    optional: true
- back:
    optional: true
- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 15000

# === Phase 4.5: 訓練計畫概覽頁驗證 ===
# 依據：TEST-SPEC-01 Section 4.1 — Plan Overview 結構驗證
- runFlow: ../subflows/verify-plan-overview.yaml

# 返回主頁
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 300
    optional: true
- tapOn:
    text: "關閉|完成|Done"
    optional: true
- back:
    optional: true
- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 15000

# === Phase 5: 週回顧 + 重生流程（regression-v2-weekly-flow 核心邏輯） ===

# Step 1: 刪除當前週回顧
- tapOn: "更多"
- tapOn:
    text: "🐛 Debug 工具"
- tapOn: "🗑️ 刪除當前週回顧"
- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 10000

# Step 2: 刪除當前週課表
- tapOn: "更多"
- tapOn:
    text: "🐛 Debug 工具"
- tapOn: "🗑️ 刪除當前週課表"

# 等待進入 noWeeklyPlan 或 needsWeeklySummary 狀態
- extendedWaitUntil:
    visible:
      text: "產生週課表|產生週回顧"
    timeout: 15000

# Step 3: 如果需要先產生週回顧（Week 2+）
- tapOn:
    text: "產生週回顧"
    optional: true
- extendedWaitUntil:
    visible:
      text: "訓練完成度|產生週課表"
    timeout: 45000

# Step 4: 產生週課表
- assertVisible:
    text: "產生下週課表|產生週課表"
- tapOn:
    text: "產生下週課表|產生週課表"

# 等待課表產生完成
- extendedWaitUntil:
    visible:
      text: "每日訓練|載入失敗|重試"
    timeout: 60000

# 驗證成功
- assertVisible: "每日訓練"
- assertVisible: "星期一"

# 滑動確認完整
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
    timeout: 15000
- scrollUntilVisible:
    element: "休息"
    direction: UP
    timeout: 10000

# === Phase 6: 重生後再次品質驗證 ===
# Scroll to top（Phase 5 結束時畫面停在中間，quality 驗證需從頂部開始）
- scrollUntilVisible:
    element: "km|miles"
    direction: UP
    timeout: 10000
    optional: true

# 重生後方法論特定驗證（beginner 路徑：不應出現高強度）
- runFlow: ../subflows/verify-methodology-beginner.yaml
- runFlow: ../subflows/verify-plan-quality.yaml
