appId: com.havital.Havital.dev
---
- runFlow: demo-login-only.yaml
- runFlow: ../subflows/nav-to-profile.yaml
- scrollUntilVisible:
    element: "IAP Test Console"
    direction: DOWN
    timeout: 20000
- tapOn: "IAP Test Console"
- extendedWaitUntil:
    visible: "IAP Test Console"
    timeout: 10000
- scrollUntilVisible:
    element: "Set Expired"
    direction: DOWN
    timeout: 15000
- tapOn: "Set Expired"
- swipe:
    start: "50%, 20%"
    end: "50%, 80%"
    duration: 800
- takeScreenshot: /tmp/after-set-expired-v2
- assertVisible: "succeeded"
