appId: com.havital.Havital.dev
tags:
  - spec-compliance
  - target-race-edit
  - AC-TREDIT-06
---
# AC-TREDIT-06: Given race API 回傳錯誤，When 用戶嘗試從資料庫選擇，
# Then 系統必須顯示錯誤提示並保留「手動輸入」入口，不得讓編輯畫面卡死。
#
# ⚠️ Maestro cannot mock network. This AC is fully covered by XCTest:
#   TargetRaceEditAPIFailureACTests.test_ac_tredit_06_api_failure_sets_unavailable_flag
#   (verifies isRaceAPIAvailable=false, raceEvents empty, isLoadingRaces=false after throw)
#
# This Maestro flow verifies the structural safety: after opening race picker,
# the user can always go back to manual input form regardless of API state.
# The actual error UI (apiFailureView) only appears when API truly fails.
#
# Preconditions: logged in, has race_run target

- runFlow: ../../../subflows/ensure-race-target-from-database.yaml
- runFlow: ../../../subflows/open-main-target-edit.yaml

# Open race picker
- tapOn:
    id: "EditTarget_BrowseDatabaseButton"

- extendedWaitUntil:
    visible:
      text: "選擇賽事|Select Race"
    timeout: 15000

# Structural safety: user can always go back (dismisses the race picker navigation)
- tapOn:
    point: "9%,13%"

- extendedWaitUntil:
    visible:
      text: "編輯賽事目標|Edit Race Goal|レース目標編集"
    timeout: 5000

# AC-TREDIT-06 core assertion: manual input form is still accessible, not blocked
- assertVisible:
    text: "賽事名稱|Race Name|レース名"
