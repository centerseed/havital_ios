appId: com.havital.Havital.dev
tags:
  - setup
---
- launchApp:
    stopApp: true
    clearState: false
- runFlow:
    file: ../subflows/reviewer-demo-login.yaml
    optional: true
- extendedWaitUntil:
    visible:
      text: "訓練計畫|每日訓練|Training Plan|Daily Training"
    timeout: 30000
- runFlow:
    file: ../subflows/nav-to-profile.yaml
- scrollUntilVisible:
    element:
      id: "Profile_ResetGoalButton"
    direction: DOWN
- tapOn:
    id: "Profile_ResetGoalButton"
- tapOn:
    text: "確認|Confirm"
- extendedWaitUntil:
    visible:
      text: "個人最佳成績|歡迎來到|開始設定|Personal Best|Welcome to Paceriz|Start Setup"
    timeout: 15000
