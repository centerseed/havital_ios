appId: com.havital.Havital.dev
tags:
  - setup
---
- launchApp:
    stopApp: true
    clearState: false
- runFlow:
    file: ../subflows/reviewer-demo-login.yaml
    optional: true
- extendedWaitUntil:
    visible:
      text: "訓練計畫|每日訓練"
    timeout: 30000
- tapOn: "更多"
- tapOn: "個人資料"
- scrollUntilVisible:
    element: "重新設定目標"
    direction: DOWN
- tapOn: "重新設定目標"
- tapOn: "確認"
- extendedWaitUntil:
    visible:
      text: "個人最佳成績|歡迎來到|開始設定"
    timeout: 15000
