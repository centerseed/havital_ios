appId: com.havital.Havital.dev
tags:
  - onboarding
  - critical
  - race_run
  - paceriz
---
# A1: race_run paceriz smoke gate

- runFlow: ../subflows/ensure-goal-type-screen.yaml

- assertVisible:
    id: "GoalType_NextButton"
- tapOn:
    id: "GoalType_race_run"
- tapOn:
    id: "GoalType_NextButton"

- runFlow: ../subflows/assert-onboarding-branch.yaml
- assertVisible:
    id: "RaceSetup_SaveButton"
- tapOn:
    id: "RaceSetup_SaveButton"

- runFlow: ../subflows/assert-onboarding-branch.yaml
- extendedWaitUntil:
    visible:
      id: "Methodology_paceriz"
    timeout: 15000
- tapOn:
    id: "Methodology_paceriz"
- tapOn:
    id: "Methodology_NextButton"

- runFlow: ../subflows/assert-onboarding-branch.yaml
- tapOn:
    id: "StartStage_NextButton"
    optional: true

- runFlow: ../subflows/assert-onboarding-branch.yaml
- runFlow: ../subflows/assert-preference-persistence.yaml

- assertVisible:
    text: "每日訓練|Daily Training|Training Plan"
- assertVisible:
    text: "星期.*"
- assertVisible:
    text: "間歇|節奏|輕鬆跑|長距離|休息"
- runFlow: ../subflows/assert-workout-card-structure.yaml
