appId: com.havital.Havital.dev
tags:
  - onboarding
  - critical
  - race_run
  - paceriz
---
# T1: 賽事 + Paceriz 平衡訓練法

- runFlow: ../subflows/pass-pb-step.yaml
- runFlow: ../subflows/pass-weekly-distance.yaml

- assertVisible: "訓練目標"
- tapOn: "賽事訓練"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

# 賽事設定
- tapOn:
    id: "RaceSetup_SaveButton"
    optional: true

# 方法論 → paceriz（等 API 載入）
- extendedWaitUntil:
    visible:
      id: "Methodology_paceriz"
    timeout: 15000
- tapOn:
    id: "Methodology_paceriz"
- tapOn:
    id: "Methodology_NextButton"

# 起始階段（若時間緊張才出現，在 Methodology 之後）
- tapOn:
    id: "StartStage_NextButton"
    optional: true

- assertVisible: "訓練偏好設定"
- tapOn:
    id: "TrainingDays_SaveButton"

- runFlow: ../subflows/verify-plan-generated.yaml

# === 課表合理性驗證（方法論特定） ===
# 依據：paceriz-workout-spec.md — base 階段以輕鬆跑和 LSD 為主
- runFlow: ../subflows/verify-methodology-race-base.yaml

# === 品質指南驗證 ===
- runFlow: ../subflows/verify-plan-quality.yaml
