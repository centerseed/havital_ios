appId: com.havital.Havital.dev
tags:
  - onboarding
  - critical
  - beginner
  - fresh-user
---
# 全新用戶：登出 → Demo 登入 → 新手入門 onboarding → 品質驗證
# 目的：模擬完全乾淨的用戶狀態，驗證 beginner 路徑不出錯
# 前提：App 已登入（任何狀態皆可，會先登出）

# === Step 0: 登出並重新 Demo 登入 ===
- runFlow: ../subflows/logout-and-demo-login.yaml

# === Step 1: PB + 週跑量 ===
- runFlow: ../subflows/pass-pb-step.yaml
- runFlow: ../subflows/pass-weekly-distance.yaml

# === Step 2: 選新手入門 ===
- assertVisible: "訓練目標"
- tapOn: "新手入門"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

# === Step 3: 跳過可能出現的中間步驟 ===
- tapOn:
    id: "TrainingWeeks_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "StartStage_NextButton"
    optional: true
- tapOn:
    text: "繼續"
    optional: true
- tapOn:
    id: "Methodology_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

# === Step 4: 訓練偏好 ===
- assertVisible: "訓練偏好設定"
- tapOn:
    id: "TrainingDays_SaveButton"

# === Step 5: 驗證計畫產生 ===
- runFlow: ../subflows/verify-plan-generated.yaml

# === Step 6: 方法論合理性驗證 ===
- assertVisible: "輕鬆跑"
- assertNotVisible: "間歇訓練"
- assertNotVisible: "節奏跑"
- assertNotVisible: "巡航間歇"

# === Step 7: 品質指南驗證 ===
- runFlow: ../subflows/verify-plan-quality.yaml
