appId: com.havital.Havital.dev
tags:
  - onboarding
  - p1
  - race_run
  - hansons
---
# T3: 賽事 + 漢森馬拉松訓練法

- runFlow: ../subflows/ensure-goal-type-screen.yaml

- assertVisible:
    id: "GoalType_NextButton"
- tapOn:
    id: "GoalType_race_run"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

# 賽事設定
- tapOn:
    id: "RaceSetup_SaveButton"
    optional: true

# 方法論 → hansons（等 API 載入）
- extendedWaitUntil:
    visible:
      id: "Methodology_hansons"
    timeout: 15000
- tapOn:
    id: "Methodology_hansons"
- tapOn:
    id: "Methodology_NextButton"

# 起始階段（若時間緊張才出現，在 Methodology 之後）
- tapOn:
    id: "StartStage_NextButton"
    optional: true

- assertVisible:
    id: "TrainingDays_SaveButton"
- tapOn:
    id: "TrainingDays_SaveButton"

- runFlow: ../subflows/verify-plan-generated.yaml

# === 課表合理性驗證（方法論特定） ===
# 依據：hansons-workout-spec.md — base 階段以輕鬆跑和 LSD 為主
- runFlow: ../subflows/verify-methodology-race-base.yaml

# === 品質指南驗證 ===
- runFlow: ../subflows/verify-plan-quality.yaml
