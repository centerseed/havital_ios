appId: com.havital.Havital.dev
tags:
  - regression
  - target
  - crud
---
# 回歸測試：賽事（Supporting Target）新增流程
# 目的：驗證支援賽事 Create 流程可進入、可填寫並成功返回概覽
# 前提：App 已登入，有課表資料（V2 用戶）
# 路徑：主頁 → 更多選單 → 訓練總覽 → 支援賽事 → 新增 → 返回概覽
# 注意：SupportingRacesCard 的 + 按鈕是 plus.circle 圖示，無文字

# 先收斂到主畫面（支援 zh/en/ja）
- runFlow: ../subflows/ensure-main-training-screen.yaml

# === Step 1: 導航到訓練總覽（內含支援賽事區塊）===

# 開啟右側選單（優先使用穩定 id）
- tapOn:
    id: "ellipsis.circle"
    optional: true
- tapOn:
    text: "訓練計畫概覽|訓練總覽|Training Plan Overview|トレーニング計画概要"
    optional: true
- tapOn:
    text: "更多|More|もっと見る"
    optional: true

# 再嘗試一次概覽入口（若前一步已成功，這步會被略過）
- tapOn:
    text: "訓練計畫概覽|訓練總覽|Training Plan Overview|トレーニング計画概要"
    optional: true

# 等待訓練總覽頁載入（相容舊版與新版概覽）
- extendedWaitUntil:
    visible:
      text: "目標資訊|訓練目標|總週數|週數|Target Info|Training Goal|Weeks|週間|Total Weeks"
    timeout: 12000

# 新版概覽先切到「訓練計畫」分頁，舊版則略過
- tapOn:
    text: "訓練計畫|Training Plan|トレーニング計画"
    optional: true

# 滑動找到支援賽事區塊（或目標賽事）
- scrollUntilVisible:
    element: "支援賽事|目標賽事|Supporting Races|Target Race|サポートレース|目標レース"
    direction: DOWN
    timeout: 15000

# 確認支援賽事區塊可見
- assertVisible: "支援賽事|目標賽事|Supporting Races|Target Race|サポートレース|目標レース"

# === Step 2: 新增支援賽事（Create）===

# 點擊「支援賽事」區塊右側的 + 按鈕（accessibilityIdentifier: "add_supporting_race"）
- tapOn:
    id: "add_supporting_race"

# 等待「添加支援賽事」頁面出現（edit_target.add_title = "添加支援賽事"）
- extendedWaitUntil:
    visible: "添加支援賽事|Add Supporting Race|サポートレースを追加"
    timeout: 5000

# 填入賽事名稱（用短名稱避免 UI 裁切造成比對誤差）
- tapOn:
    id: "race_name_input"
- inputText: "RTRace26"

# 確認賽事名稱已輸入到欄位
- assertVisible: "RTRace26"

# 等待 Save 按鈕從 disabled 變成 enabled（raceName 非空才啟用）
- extendedWaitUntil:
    visible: "儲存|Save|保存"
    timeout: 3000

# 點儲存
- tapOn:
    text: "儲存"
    optional: true
- tapOn:
    text: "Save|保存"
    optional: true

# 等待回到訓練總覽
- extendedWaitUntil:
    visible: "支援賽事|Supporting Races|サポートレース"
    timeout: 10000

# 確認已離開新增頁，且仍在支援賽事區塊
- assertNotVisible: "添加支援賽事|Add Supporting Race|サポートレースを追加"
- assertVisible: "支援賽事|Supporting Races|サポートレース"
