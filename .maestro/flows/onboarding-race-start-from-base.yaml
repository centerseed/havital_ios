appId: com.havital.Havital.dev
tags:
  - onboarding
  - p1
  - race_run
  - start-stage
---
# B8 precursor: race_run paceriz start-from-base

- runFlow: ../subflows/ensure-goal-type-screen.yaml

- assertVisible: "訓練目標"
- tapOn: "賽事訓練"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

- tapOn:
    id: "RaceSetup_SaveButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

# 起始階段 → 基礎期
- tapOn:
    id: "StartStage_base"
    optional: true
- tapOn:
    id: "StartStage_NextButton"
    optional: true
- tapOn:
    text: "繼續"
    optional: true

- tapOn:
    id: "Methodology_paceriz"
    optional: true
- tapOn:
    id: "Methodology_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

- runFlow: ../subflows/assert-preference-persistence.yaml

# === 課表合理性驗證 ===
# 使用通用 race base 驗證，避免單一文案造成誤判
- runFlow: ../subflows/verify-methodology-race-base.yaml

- runFlow: ../subflows/assert-coach-sanity-relationships.yaml
