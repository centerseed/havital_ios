appId: com.havital.Havital.dev
---
# IAP 付費牆測試：expired 用戶觸發 403 → PaywallView 彈出
# 前提：後端已透過 admin API 將 demo 帳號設為 expired
#       Scripts/iap_admin.sh set-expired

# 重啟 app（保留 state，避免 HealthKit 權限問題）
- launchApp:
    stopApp: true
    clearState: false

# 處理系統彈窗
- tapOn:
    text: "關閉"
    optional: true
- tapOn:
    text: "允許"
    optional: true
- tapOn:
    text: "好"
    optional: true

# 如果在登入頁，做 Demo 登入
- tapOn:
    id: "Login_DemoButton"
    optional: true

# 等待主頁面載入
- extendedWaitUntil:
    visible: "訓練計劃"
    timeout: 30000

# 截圖：主頁面（確認登入成功）
- takeScreenshot: iap_b1_main_page

# 確保在訓練計劃 tab
- tapOn: "訓練計劃"

# 等待頁面載入
- extendedWaitUntil:
    visible: "我的訓練目標"
    timeout: 15000

# 嘗試觸發需要訂閱的操作
# 情況 A：有「產生週課表」按鈕
- tapOn:
    text: "產生週課表"
    optional: true

# 情況 B：已有課表，嘗試刪除再重建（或其他 gated 操作）
# 先等一下看 PaywallView 是否彈出
- extendedWaitUntil:
    visible:
      text: "需要訂閱|Upgrade|paywall|關閉"
    timeout: 10000
    optional: true

# 截圖：應該是 PaywallView（B1 + B2 驗證）
- takeScreenshot: iap_b1_paywall_triggered

# B5: 測試關閉按鈕
- tapOn:
    text: "關閉"
    optional: true
- tapOn:
    text: "Close"
    optional: true

# 截圖：PaywallView 應該已 dismiss
- takeScreenshot: iap_b5_after_dismiss
