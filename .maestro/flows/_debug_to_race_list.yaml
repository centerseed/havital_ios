appId: com.havital.Havital.dev
---
- runFlow: ../subflows/ensure-goal-type-screen.yaml
- tapOn:
    id: "GoalType_race_run"
- tapOn:
    id: "GoalType_NextButton"
- extendedWaitUntil:
    visible:
      id: "RaceSetup_BrowseDatabaseButton"
    timeout: 15000
- tapOn:
    id: "RaceSetup_BrowseDatabaseButton"
- extendedWaitUntil:
    visible:
      text: "選擇賽事"
    timeout: 15000
- takeScreenshot: /tmp/race_list_debug.png
