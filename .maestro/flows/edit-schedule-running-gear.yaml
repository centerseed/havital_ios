appId: com.havital.Havital.dev
tags:
  - edit
  - critical
  - regression
---
# 測試：跑步日 gear → 開跑步編輯器（不是 StrengthEditorV2）
# 驗收 DC-3：跑步日 gear 不開 strength editor

- runFlow: ../subflows/ensure-main-training-screen.yaml

- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"

# 點第二天的 gear（第一天可能是休息日，無 gear）
- tapOn:
    id: "day_2_edit_gear"
- assertVisible: "編輯訓練"
- waitForAnimationToEnd

# 確認是跑步編輯器：跑步日有距離設定（label 為 "距離 (公里)"）
- assertVisible: "距離.*公里|Distance.*km|輕鬆跑設定"

# 確認 gear 開啟了跑步編輯器（DC-3 核心驗收）

- tapOn: "取消"
- assertVisible: "編輯週課表"
- tapOn: "取消"
- tapOn:
    text: "放棄變更"
    optional: true
- assertVisible: "每日訓練"
