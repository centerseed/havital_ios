appId: com.havital.Havital.dev
tags:
  - weekly-plan
  - critical
---
# 測試：刪除當週課表和週回顧 → 重新產生
# Week 1：刪除後直接到 noWeeklyPlan（產生週課表）
# Week 2+：刪除後先 needsWeeklySummary（產生週回顧）→ 再產生課表

- assertVisible: "每日訓練"

# Step 1: 刪除當前週回顧
- tapOn: "更多"
- tapOn:
    text: "🐛 Debug 工具"
- tapOn: "🗑️ 刪除當前週回顧"

- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 10000

# Step 2: 刪除當前週課表
- tapOn: "更多"
- tapOn:
    text: "🐛 Debug 工具"
- tapOn: "🗑️ 刪除當前週課表"

# 等待進入 noWeeklyPlan 或 needsWeeklySummary
- extendedWaitUntil:
    visible: "產生週課表"
    timeout: 15000

# Step 3: 如果需要先產生週回顧（Week 2+）
- tapOn:
    text: "產生週回顧"
    optional: true

# 等待週回顧完成（如果有觸發）
- extendedWaitUntil:
    visible: "產生週課表"
    timeout: 45000

# Step 4: 產生週課表
- tapOn: "產生週課表"

# 等待課表產生
- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 30000

# 驗證新課表
- assertVisible: "星期一"
- assertVisible: "休息"
- scrollUntilVisible:
    element: "星期日"
    direction: DOWN
