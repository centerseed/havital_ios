appId: com.havital.Havital.dev
tags:
  - edit
  - critical
  - strength
---
# 測試：跑步編輯器中的補充訓練區塊可用
# 目標：確認「+ 新增力量訓練」路徑可打開補充訓練欄位

- runFlow: ../subflows/ensure-main-training-screen.yaml

- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"

- tapOn:
    id: "day_2_edit_gear"
- assertVisible: "編輯訓練"
- assertVisible: "訓練說明|配速|距離|\\+ 新增力量訓練|補充訓練"

- scrollUntilVisible:
    element:
      text: "\\+ 新增力量訓練|補充訓練"
    direction: DOWN
    timeout: 15000

- tapOn: "\\+ 新增力量訓練|補充訓練"
- assertVisible: "補充訓練|補充力量訓練"
- assertVisible: "訓練類型"

- tapOn: "取消"
- assertVisible: "編輯週課表"
- tapOn: "取消"
- tapOn:
    text: "放棄變更"
    optional: true
- runFlow: ../subflows/ensure-main-training-screen.yaml
