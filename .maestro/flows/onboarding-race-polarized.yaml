appId: com.havital.Havital.dev
tags:
  - onboarding
  - p1
  - race_run
  - polarized
---
# T4: 賽事 + 極化訓練法

- runFlow: ../subflows/ensure-goal-type-screen.yaml

- assertVisible: "訓練目標"
- tapOn: "賽事訓練"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

# 賽事設定
- tapOn:
    id: "RaceSetup_SaveButton"
    optional: true

# 方法論 → polarized（等 API 載入）
- extendedWaitUntil:
    visible:
      id: "Methodology_polarized"
    timeout: 15000
- tapOn:
    id: "Methodology_polarized"
- tapOn:
    id: "Methodology_NextButton"

# 起始階段（若時間緊張才出現，在 Methodology 之後）
- tapOn:
    id: "StartStage_NextButton"
    optional: true

- assertVisible:
    id: "TrainingDays_SaveButton"
- tapOn:
    id: "TrainingDays_SaveButton"

- runFlow: ../subflows/verify-plan-generated.yaml

# === 課表合理性驗證（方法論特定） ===
# 依據：polarized-workout-spec.md — 極化訓練 80/20，base 階段以 low 為主
- assertNotVisible: "節奏跑"
- runFlow: ../subflows/verify-methodology-race-base.yaml

# === 品質指南驗證 ===
- runFlow: ../subflows/verify-plan-quality.yaml
