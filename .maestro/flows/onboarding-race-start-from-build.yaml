appId: com.havital.Havital.dev
tags:
  - onboarding
  - p2
  - boundary
  - layer-b
  - race_run
  - start-stage
---
# B8: race_run paceriz start-from-build

- runFlow: ../subflows/ensure-goal-type-screen.yaml

- assertVisible: "訓練目標"
- tapOn: "賽事訓練"
- tapOn:
    text: "下一步"
    optional: true
- tapOn:
    id: "GoalType_NextButton"
    optional: true

- tapOn:
    id: "RaceSetup_SaveButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

# 起始階段 → 強化期
- tapOn:
    id: "StartStage_build"
    optional: true
- tapOn:
    id: "StartStage_NextButton"
    optional: true
- tapOn:
    text: "繼續"
    optional: true

- tapOn:
    id: "Methodology_paceriz"
    optional: true
- tapOn:
    id: "Methodology_NextButton"
    optional: true
- tapOn:
    text: "下一步"
    optional: true

- runFlow: ../subflows/assert-preference-persistence.yaml

# === 課表合理性驗證 ===
# build 期應出現至少一種強度課（間歇/節奏/巡航間歇）
- scrollUntilVisible:
    element: "間歇訓練|節奏跑|巡航間歇|Tempo Run|Interval"
    direction: DOWN
    timeout: 10000

- runFlow: ../subflows/assert-workout-card-structure.yaml
