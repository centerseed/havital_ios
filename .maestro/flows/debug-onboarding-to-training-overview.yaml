appId: com.havital.Havital.dev
tags:
  - debug
  - onboarding
---
- tapOn:
    text: "不允許|Don't Allow|Don’t Allow|不允许"
    optional: true

- runFlow:
    file: ../subflows/reviewer-demo-login.yaml
    optional: true

- tapOn:
    text: "稍後|Later|後で|不再提醒|Not Now|Skip"
    optional: true

- extendedWaitUntil:
    visible:
      id: "OnboardingStartButton"
    timeout: 30000
    optional: true
- tapOn:
    id: "OnboardingStartButton"
    optional: true

- extendedWaitUntil:
    visible:
      id: "DataSource_Screen"
    timeout: 15000
- tapOn:
    text: "稍後設定|Set Up Later|後で設定"

- tapOn:
    id: "HeartRateZone_ContinueButton"
    optional: true
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true
- tapOn:
    text: "略過|Skip|スキップ"
    optional: true

- tapOn:
    id: "GoalType_beginner"
    optional: true
- tapOn:
    text: "Build Habit|養成習慣|習慣づくり"
    optional: true
- tapOn:
    text: "下一步|Next Step|次のステップ"
    optional: true
- tapOn:
    id: "TrainingWeeks_NextButton"
    optional: true
- tapOn:
    id: "TrainingDays_SaveButton"

- extendedWaitUntil:
    visible:
      id: "TrainingOverview_Screen"
    timeout: 60000
    optional: true
- assertVisible:
    id: "TrainingOverview_Screen"
    optional: true
