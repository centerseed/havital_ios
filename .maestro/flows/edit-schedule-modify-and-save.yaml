appId: com.havital.Havital.dev
tags:
  - edit
  - critical
---
# 測試：編輯課表 — 改訓練類型（輕鬆跑→恢復跑）→ 儲存 → 回到主畫面

# 重啟 app 並收斂到主課表頁
- runFlow: ../subflows/ensure-main-training-screen.yaml

- assertVisible: "每日訓練"

# 進編輯課表
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"

# 點第四天訓練類型 dropdown（避免第一天可能是休息）
- tapOn:
    id: "training_type_menu_4"

# 選休息（文案穩定）
- tapOn: "休息"

# 儲存（hasUnsavedChanges = true）
- tapOn: "儲存"

# 等 API 完成
- extendedWaitUntil:
    visible: "每日訓練|編輯週課表"
    timeout: 15000

- tapOn:
    text: "取消"
    optional: true
- runFlow: ../subflows/ensure-main-training-screen.yaml
- assertVisible: "休息|每日訓練"

# === TEARDOWN：還原資料（第四天從休息改回跑步）===
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"
- tapOn:
    id: "training_type_menu_4"
- tapOn: "間歇訓練|節奏跑|長距離輕鬆跑"
- tapOn: "儲存"
- runFlow: ../subflows/ensure-main-training-screen.yaml
