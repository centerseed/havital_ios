appId: com.havital.Havital.dev
tags:
  - edit
  - critical
---
# 完整編輯課表測試
# E1: 進出不破壞
# E2: 改訓練類型 → 儲存
# E3: 改配速（套用建議）→ 儲存
# E4: 齒輪編輯 sheet

# 重啟 app 並收斂到主課表頁
- runFlow: ../subflows/ensure-main-training-screen.yaml

# === E1: 進出不破壞 ===
- assertVisible: "每日訓練"
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"
- tapOn: "取消"
- assertVisible: "每日訓練"

# === E2: 改訓練類型 ===
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"
# 點第四天訓練類型 dropdown（避免第一天可能是休息）
- tapOn:
    id: "training_type_menu_4"
# 選休息（文案穩定）
- tapOn: "休息"
# 確認已可見休息
- assertVisible: "休息"
# 儲存
- tapOn: "儲存"
- extendedWaitUntil:
    visible: "每日訓練|編輯週課表"
    timeout: 15000
- tapOn:
    text: "取消"
    optional: true
- runFlow: ../subflows/ensure-main-training-screen.yaml
- assertVisible: "休息|每日訓練"

# === E3: 改配速（透過齒輪 sheet 套用建議配速）===
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"
# 點第二天齒輪進入編輯 sheet（使用 stable id）
- tapOn:
    id: "day_2_edit_gear"
- assertVisible: "編輯訓練"
# 點套用建議配速
- tapOn: "套用"
# 點儲存（sheet 內）
- tapOn: "儲存"
# 回到編輯週課表
- assertVisible: "編輯週課表"
# 儲存整個課表
- tapOn: "儲存"
- extendedWaitUntil:
    visible: "每日訓練"
    timeout: 15000
- assertVisible: "每日訓練"

# === TEARDOWN：還原資料（第四天從休息改回跑步）===
- tapOn: "更多"
- tapOn: "編輯課表"
- assertVisible: "編輯週課表"
- tapOn:
    id: "training_type_menu_4"
- tapOn:
    text: "間歇訓練|節奏跑|長距離輕鬆跑"
- tapOn: "儲存"
- runFlow: ../subflows/ensure-main-training-screen.yaml
